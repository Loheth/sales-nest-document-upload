name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-application:
    name: Lint Application Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff linter
        run: uv run ruff check src/ tests/

      - name: Run ruff formatter check
        run: uv run ruff format --check src/ tests/

  test-application:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest

  lint-terraform:
    name: Lint Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Format check
        working-directory: infrastructure
        run: terraform fmt -check -recursive

      - name: Setup Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          directory: infrastructure
          soft_fail: true

  plan-terraform-dev:
    name: Terraform Plan (Dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws-us-gov:iam::306438150607:role/TerraformExecutionRole
          aws-region: ${{ secrets.AWS_REGION || 'us-gov-west-1' }}

      - name: Ensure AWS credentials are configured
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        working-directory: infrastructure/environments/dev
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-gov-west-1' }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        working-directory: infrastructure/environments/dev
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-gov-west-1' }}
        run: terraform plan
