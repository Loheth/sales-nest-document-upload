name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Skip Docker layer cache (clean build)"
        type: boolean
        default: false
  push:
    branches:
      - main

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-gov-west-1
  ECR_REPOSITORY: document-analysis-microservice
  ECS_CLUSTER: document-analysis-dev
  WORKER_SERVICE: document-analysis-microservice-dev-worker
  BRIDGE_SERVICE: document-analysis-microservice-dev-bridge

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_tag=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image will be tagged: dev-${SHORT_SHA}, dev-latest"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws-us-gov:iam::306438150607:role/TerraformExecutionRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure AWS credentials are configured
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Delete dev-latest tag if it exists (ECR immutable tags)
        run: |
          set -euo pipefail
          aws ecr batch-delete-image \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="dev-latest" \
            --region "${AWS_REGION}" \
            2>&1 || echo "No existing dev-latest image to delete (this is OK)"

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE_BASE="${REGISTRY}/${ECR_REPOSITORY}"
          CACHE_ARGS="--cache-from type=gha --cache-to type=gha,mode=max"
          if [ "${{ inputs.no_cache }}" = "true" ]; then
            CACHE_ARGS="--no-cache --cache-to type=gha,mode=max"
          fi
          docker buildx build \
            $CACHE_ARGS \
            --push \
            -t "${IMAGE_BASE}:${IMAGE_TAG}" \
            -t "${IMAGE_BASE}:dev-latest" \
            .
          echo "Pushed ${IMAGE_BASE}:${IMAGE_TAG} and ${IMAGE_BASE}:dev-latest"

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws-us-gov:iam::306438150607:role/TerraformExecutionRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure AWS credentials are configured
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        working-directory: infrastructure/environments/dev
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        working-directory: infrastructure/environments/dev
        run: terraform plan -var="container_image_tag=${{ needs.build-and-push.outputs.image_tag }}" -out=tfplan

      - name: Terraform Apply
        working-directory: infrastructure/environments/dev
        run: terraform apply -auto-approve tfplan

  rollout-deployment:
    name: Rollout Deployment to Dev ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-infrastructure]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws-us-gov:iam::306438150607:role/TerraformExecutionRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment on worker and bridge
        run: |
          set -euo pipefail
          for SVC in "${WORKER_SERVICE}" "${BRIDGE_SERVICE}"; do
            echo "Rolling out ${SVC}..."
            aws ecs update-service \
              --cluster "${ECS_CLUSTER}" \
              --service "${SVC}" \
              --force-new-deployment \
              --region "${AWS_REGION}" \
              --no-cli-pager
          done
          echo "ECS service deployments triggered."

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${WORKER_SERVICE}" "${BRIDGE_SERVICE}" \
            --region "${AWS_REGION}"
          echo "Services stable."
